name: moeazi-agents

x-agent-service: &agent-service
  build: ./agent-service
  env_file: ${AGENT_ENV_FILE:-.env.agents.example}
  environment:
    WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET:-}
    CONVEX_WORKER_URL: ${CONVEX_WORKER_URL:-}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    AGENT_DEV_CONTROLS_ENABLED: ${AGENT_DEV_CONTROLS_ENABLED:-true}
    AGENT_MANUAL_GUARD_DEFAULT: ${AGENT_MANUAL_GUARD_DEFAULT:-true}
    AGENT_LITE_MODE_DEFAULT: ${AGENT_LITE_MODE_DEFAULT:-true}
    DEV_STARTER_CREDITS: ${DEV_STARTER_CREDITS:-100}
    DEV_LITE_ACCOUNT_RUNS_PER_DAY: ${DEV_LITE_ACCOUNT_RUNS_PER_DAY:-4}
    DEV_LITE_GLOBAL_RUNS_PER_DAY: ${DEV_LITE_GLOBAL_RUNS_PER_DAY:-8}
    DEV_LITE_PROVIDER_BUDGET_USD: ${DEV_LITE_PROVIDER_BUDGET_USD:-0.10}
    ARBITRUM_RPC_URL: ${ARBITRUM_RPC_URL:-}
    MAINNET_VENUE_SETUP_ENABLED: ${MAINNET_VENUE_SETUP_ENABLED:-false}
    LIVE_EXECUTION_ENABLED: ${LIVE_EXECUTION_ENABLED:-false}
    CERTIFIED_VENUES: ${CERTIFIED_VENUES:-}
  depends_on:
    temporal:
      condition: service_started
    timescaledb:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  timescaledb:
    image: timescale/timescaledb:2.28.2-pg16
    environment:
      POSTGRES_DB: moeazi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./agent-service/migrations:/docker-entrypoint-initdb.d:ro
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d moeazi"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redis-data:/data"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  temporal:
    image: temporalio/temporal:latest
    command: ["server", "start-dev", "--ip", "0.0.0.0"]
    ports: ["7233:7233", "8233:8233"]

  api:
    <<: *agent-service
    command: ["uvicorn", "moeazi_agent.api:app", "--host", "0.0.0.0", "--port", "8100"]
    ports: ["8100:8100"]

  worker:
    <<: *agent-service
    command: ["python", "-m", "moeazi_agent.temporal_app"]
    deploy:
      replicas: 2

  dispatcher:
    <<: *agent-service
    command: ["python", "-m", "moeazi_agent.dispatcher"]
    profiles: ["legacy-polling"]

  ingestors:
    <<: *agent-service
    command: ["python", "-m", "moeazi_agent.ingestor"]
    profiles: ["continuous-ingestion"]

  execution-gateway:
    <<: *agent-service
    command: ["uvicorn", "moeazi_agent.execution_api:app", "--host", "0.0.0.0", "--port", "8200"]
    ports: ["8200:8200"]

  execution-sidecar:
    build: ./execution-sidecar
    env_file: ${AGENT_ENV_FILE:-.env.agents.example}
    environment:
      WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET:-}
      ARBITRUM_RPC_URL: ${ARBITRUM_RPC_URL:-}
      MAINNET_VENUE_SETUP_ENABLED: ${MAINNET_VENUE_SETUP_ENABLED:-false}
      LIVE_EXECUTION_ENABLED: ${LIVE_EXECUTION_ENABLED:-false}
      CERTIFIED_VENUES: ${CERTIFIED_VENUES:-}
      UNISWAP_API_KEY: ${UNISWAP_API_KEY:-}
      UNISWAP_ARBITRUM_TARGETS: ${UNISWAP_ARBITRUM_TARGETS:-}
    restart: unless-stopped
    ports: ["8300:8300"]

volumes:
  timescale-data:
  redis-data:
