<template id="hero-overview-template">
  <div id="hero-overview" data-composition-id="hero-overview" data-start="0" data-duration="5" data-width="1920" data-height="1080">
    <div class="scene">
      <div class="copy-column">
        <div class="meta">hero overview</div>
        <h1>Real account state, live balances, and visible controls.</h1>
        <p>
          Moeazi already has an operating surface for health, equity, exposure, and execution readiness.
        </p>
        <div class="callouts">
          <article class="callout blue"><span>status</span><strong>active</strong></article>
          <article class="callout cream"><span>equity</span><strong>$18.2k</strong></article>
          <article class="callout orange"><span>mode</span><strong>live</strong></article>
        </div>
      </div>

      <div class="shot-wrap">
        <div class="shot-frame" data-layout-allow-overflow>
          <img class="shot" src="../capture-overview/screenshots/scroll-000.png" alt="Moeazi overview demo route" />
        </div>
      </div>
    </div>

    <style>
      #hero-overview { position: relative; width: 1920px; height: 1080px; overflow: hidden; background: #fffdf5; }
      .scene { display: grid; grid-template-columns: 468px minmax(0, 1fr); gap: 30px; width: 100%; height: 100%; padding: 56px; background: #fffdf5; }
      .copy-column, .callout { border: 5px solid #111; box-shadow: 8px 8px 0 #111; }
      .copy-column { display: grid; gap: 18px; align-content: start; padding: 22px; background: #74b9ff; }
      .meta, .callout span { display: inline-block; width: fit-content; padding: 8px 12px; border: 3px solid #111; background: #fffdf5; box-shadow: 4px 4px 0 #111; font: 700 20px/1 "IBM Plex Mono", monospace; letter-spacing: 0.12em; text-transform: uppercase; color: #111; }
      h1 { margin: 0; max-width: 7.4ch; font: 800 60px/0.9 "Syne", sans-serif; letter-spacing: -0.06em; color: #111; text-wrap: balance; }
      p { margin: 0; max-width: 19ch; font: 600 21px/1.34 "Plus Jakarta Sans", sans-serif; color: #111; }
      .callouts { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
      .callout { min-width: 0; display: grid; gap: 10px; align-content: start; padding: 14px 12px; background: #fff8e9; }
      .callout strong { font: 800 25px/0.92 "Syne", sans-serif; letter-spacing: -0.04em; }
      .callout.blue { background: #74b9ff; }
      .callout.cream { background: #fff1cf; }
      .callout.orange { background: #ffa552; }
      .callout.orange span { background: #111; color: #fffdf5; }
      .shot-wrap { min-width: 0; display: flex; align-items: center; }
      .shot-frame { width: 100%; aspect-ratio: 16 / 9; overflow: hidden; border: 5px solid #111; background: #fffdf5; box-shadow: 8px 8px 0 #111; }
      .shot { width: 100%; height: 100%; object-fit: contain; object-position: center top; display: block; background: #fffdf5; }
    </style>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.fromTo(".copy-column", { opacity: 0, x: -60 }, { opacity: 1, x: 0, duration: 0.45 }, 0);
      tl.fromTo(".shot-frame", { opacity: 0, x: 70 }, { opacity: 1, x: 0, duration: 0.5 }, 0.1);
      tl.fromTo(".callout", { opacity: 0, y: 28 }, { opacity: 1, y: 0, duration: 0.34, stagger: 0.1 }, 0.28);
      tl.to(".shot", { scale: 1.045, duration: 5, ease: "none" }, 0);
      tl.to(".callout.blue", { y: -5, duration: 1.2, repeat: 2, yoyo: true, ease: "sine.inOut" }, 1);
      tl.to(".callout.orange", { y: 5, duration: 1.2, repeat: 2, yoyo: true, ease: "sine.inOut" }, 1.4);
      window.__timelines["hero-overview"] = tl;
    </script>
  </div>
</template>
