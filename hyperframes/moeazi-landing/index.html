<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #fffdf5; }
      #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; background: #fffdf5; }
      .scene-clip { position: absolute; inset: 0; width: 1920px; height: 1080px; overflow: hidden; }
      .brand-stamp {
        position: absolute; top: 36px; right: 40px; padding: 10px 14px; border: 3px solid #111;
        background: #ffd23f; box-shadow: 4px 4px 0 #111; font: 700 22px/1 "IBM Plex Mono", monospace;
        letter-spacing: 0.12em; text-transform: uppercase; z-index: 40;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="15" data-width="1920" data-height="1080">
      <div
        id="hero-scene"
        class="scene-clip"
        data-composition-id="hero-overview"
        data-composition-src="compositions/hero-overview.html"
        data-start="0"
        data-duration="5"
        data-track-index="1"
      ></div>
      <div
        id="tour-scene"
        class="scene-clip"
        data-composition-id="walkthrough-tour"
        data-composition-src="compositions/walkthrough-tour.html"
        data-start="5"
        data-duration="5"
        data-track-index="1"
      ></div>
      <div
        id="trust-scene"
        class="scene-clip"
        data-composition-id="trust-model"
        data-composition-src="compositions/trust-model.html"
        data-start="10"
        data-duration="5"
        data-track-index="1"
      ></div>
      <div id="brand-stamp" class="clip brand-stamp" data-start="0" data-duration="15" data-track-index="3">
        Moeazi
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.fromTo("#brand-stamp", { opacity: 0, y: -24 }, { opacity: 1, y: 0, duration: 0.35 }, 0);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
